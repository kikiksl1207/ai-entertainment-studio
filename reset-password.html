    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="Lumina Stage 비밀번호 재설정 페이지." />
    <meta name="robots" content="noindex, nofollow" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="비밀번호 재설정 — Lumina Stage" />
    <meta property="og:site_name" content="Lumina Stage" />

  <body class="is-booting">
    <header class="site-header">
      <div class="shell header-inner">
        <a class="brand" href="./index.html">
          <img class="brand-logo" src="./assets/brand/lumina-stage-logo.png" alt="Lumina Stage" onerror="this.style.display='none'" />
          <span class="brand-copy">
            <strong>Lumina Stage</strong>
            <small data-i18n="brand.tagline">아티스트 레이블</small>
          </span>
        </a>
      </div>
    </header>

    <main>
      <section class="content-section auth-confirm-section">
        <div class="shell auth-confirm-shell">
          <article class="auth-confirm-card" id="resetPwCard" data-state="form" aria-live="polite">
            <p class="eyebrow" id="resetPwKicker">Reset Password</p>
            <h1 id="resetPwTitle">새 비밀번호 설정</h1>
            <p id="resetPwBody">이메일로 받은 링크에서 새 비밀번호를 설정해주세요. 안전을 위해 다른 사이트와 다른 비밀번호를 권장해요.</p>

            <form class="auth-confirm-form" id="resetPwForm" novalidate>
              <label class="auth-confirm-field">
                <span>이메일</span>
                <input id="resetPwEmail" name="email" type="email" autocomplete="email" required placeholder="가입 시 사용한 이메일" />
                <small>인증 링크와 같은 계정의 이메일을 적어주세요.</small>
              </label>
              <label class="auth-confirm-field">
                <span>새 비밀번호</span>
                <input id="resetPwNew" name="newPassword" type="password" autocomplete="new-password" minlength="8" required placeholder="8자 이상" />
                <small>8자 이상으로 입력해주세요.</small>
              </label>
              <label class="auth-confirm-field">
                <span>새 비밀번호 확인</span>
                <input id="resetPwConfirm" name="newPasswordConfirm" type="password" autocomplete="new-password" minlength="8" required placeholder="다시 한 번 입력" />
                <small id="resetPwConfirmHint">두 비밀번호가 같은지 확인해주세요.</small>
              </label>
              <p class="auth-confirm-error" id="resetPwError" hidden></p>
              <button class="button button-primary" type="submit" id="resetPwSubmit">새 비밀번호 저장</button>
            </form>

            <nav class="auth-confirm-actions" id="resetPwActions" hidden>
              <a class="button button-primary" id="resetPwPrimaryAction" href="./mypage.html">로그인하러 가기</a>
              <a class="button button-secondary" href="./index.html">홈으로</a>
            </nav>
          </article>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="shell footer-inner">
        <div>
          <strong>Lumina Stage</strong>
          <p>비밀번호 재설정 페이지입니다.</p>
        </div>
        <div class="footer-links">
          <a href="./characters.html" data-i18n="footer.artistRoster">아티스트 라인업</a>
          <a href="./terms.html" data-i18n="footer.terms">이용약관</a>
          <a href="./privacy.html" data-i18n="footer.privacy">개인정보처리방침</a>
          <a href="./refund-policy.html" data-i18n="footer.refund">환불 정책</a>
        </div>
      </div>
    </footer>

    <script src="./app.js"></script>
    <script>
      /* #240 — 비밀번호 재설정 화면.
       * URL `?token=...` 을 읽고, 사용자가 직접 이메일·새 비밀번호 입력 후
       * POST /api/v1/auth/password-resets/confirm { token, email, newPassword } 호출.
       * 성공/실패/만료/이미 사용된 토큰 상태를 카드 카피로 구분 표시.
       * 보안: token / newPassword 값을 콘솔·Notion·스토리지에 기록하지 않는다. */
      (function initResetPassword() {
        const card = document.getElementById("resetPwCard");
        const form = document.getElementById("resetPwForm");
        const emailEl = document.getElementById("resetPwEmail");
        const newPwEl = document.getElementById("resetPwNew");
        const confirmEl = document.getElementById("resetPwConfirm");
        const submitBtn = document.getElementById("resetPwSubmit");
        const errorEl = document.getElementById("resetPwError");
        const kicker = document.getElementById("resetPwKicker");
        const title = document.getElementById("resetPwTitle");
        const body = document.getElementById("resetPwBody");
        const actions = document.getElementById("resetPwActions");
        const primary = document.getElementById("resetPwPrimaryAction");
        if (!card || !form) return;

        const params = new URLSearchParams(location.search);
        const token = params.get("token") || "";

        function showError(message) {
          if (!errorEl) return;
          errorEl.hidden = !message;
          errorEl.textContent = message || "";
        }

        function setState(state, payload) {
          card.dataset.state = state;
          if (state === "form" || state === "invalid-input") {
            form.hidden = false;
            if (actions) actions.hidden = true;
            return;
          }
          form.hidden = true;
          if (actions) actions.hidden = false;
          if (state === "success") {
            if (kicker) kicker.textContent = "Password Updated";
            if (title) title.textContent = "새 비밀번호가 저장됐어요";
            if (body) body.textContent = payload?.message || "이제 새 비밀번호로 로그인할 수 있어요. 다른 기기에 로그인된 세션은 안전을 위해 자동으로 로그아웃돼요.";
            if (primary) { primary.textContent = "로그인하러 가기"; primary.href = "./mypage.html"; }
          } else if (state === "expired") {
            if (kicker) kicker.textContent = "Expired";
            if (title) title.textContent = "재설정 링크가 만료됐어요";
            if (body) body.textContent = "비밀번호 재설정 링크는 일정 시간이 지나면 사용할 수 없어요. 로그인 화면에서 다시 재설정 메일을 보내주세요.";
            if (primary) { primary.textContent = "재설정 메일 다시 받기"; primary.href = "./mypage.html"; }
          } else if (state === "used") {
            if (kicker) kicker.textContent = "Already Used";
            if (title) title.textContent = "이미 사용한 재설정 링크예요";
            if (body) body.textContent = "이 링크는 이미 사용됐어요. 새 비밀번호로 로그인하거나, 다시 재설정 메일을 받아주세요.";
            if (primary) { primary.textContent = "로그인하러 가기"; primary.href = "./mypage.html"; }
          } else if (state === "invalid") {
            if (kicker) kicker.textContent = "Invalid Link";
            if (title) title.textContent = "이 링크는 사용할 수 없어요";
            if (body) body.textContent = "메일에서 받은 재설정 링크 전체를 다시 눌러주세요. 문제가 반복되면 로그인 화면에서 재설정 메일을 다시 보내주세요.";
            if (primary) { primary.textContent = "재설정 메일 다시 받기"; primary.href = "./mypage.html"; }
          } else if (state === "error") {
            if (kicker) kicker.textContent = "Try Again";
            if (title) title.textContent = "지금 처리하지 못했어요";
            if (body) body.textContent = "잠시 후 다시 시도해주세요. 같은 문제가 반복되면 재설정 메일을 새로 받아주세요.";
            if (primary) { primary.textContent = "재설정 메일 다시 받기"; primary.href = "./mypage.html"; }
          }
        }

        function classifyError(err) {
          const status = err?.status;
          const code = (err?.body?.code || err?.body?.messageKey || err?.body?.error || "").toString().toLowerCase();
          if (status === 410 || code.includes("expired")) return "expired";
          if (status === 409 || code.includes("already") || code.includes("used")) return "used";
          if (status === 400 || status === 404 || code.includes("invalid") || code.includes("not_found") || code.includes("token")) return "invalid";
          return "error";
        }

        if (!token) {
          // 토큰 없이 진입한 경우 폼 자체를 잠그고 invalid 안내
          setState("invalid");
          return;
        }

        form.addEventListener("submit", async (event) => {
          event.preventDefault();
          showError("");
          const email = (emailEl?.value || "").trim();
          const newPassword = newPwEl?.value || "";
          const confirm = confirmEl?.value || "";

          if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            showError("이메일 형식을 다시 확인해주세요.");
            emailEl?.focus();
            return;
          }
          if (newPassword.length < 8) {
            showError("새 비밀번호는 8자 이상이어야 해요.");
            newPwEl?.focus();
            return;
          }
          if (newPassword !== confirm) {
            showError("두 비밀번호가 일치하지 않아요. 다시 확인해주세요.");
            confirmEl?.focus();
            return;
          }
          if (typeof apiFetch !== "function") {
            setState("error");
            return;
          }
          if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = "처리 중…"; }
          try {
            const data = await apiFetch("/api/v1/auth/password-resets/confirm", {
              method: "POST",
              body: { token, email, newPassword },
              throwOnError: true
            });
            setState("success", data);
          } catch (err) {
            // 입력값(이메일/비번 미스매치) 사유면 사용자 입력 다시 받기, 토큰 사유면 상태 전환
            const reason = classifyError(err);
            if (reason === "invalid" && (err?.status === 400 || err?.status === 422)) {
              showError("입력값을 확인해주세요. 같은 계정 이메일과 8자 이상 비밀번호가 필요해요.");
              if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = "새 비밀번호 저장"; }
              return;
            }
            setState(reason);
          } finally {
            if (submitBtn && submitBtn.disabled && card.dataset.state === "form") {
              submitBtn.disabled = false;
              submitBtn.textContent = "새 비밀번호 저장";
            }
          }
        });

        // 확인 비밀번호 실시간 매치 힌트
        if (confirmEl) {
          confirmEl.addEventListener("input", () => {
            const hint = document.getElementById("resetPwConfirmHint");
            if (!hint) return;
            if (!confirmEl.value) {
              hint.textContent = "두 비밀번호가 같은지 확인해주세요.";
              return;
            }
            hint.textContent = confirmEl.value === (newPwEl?.value || "")
              ? "두 비밀번호가 일치해요."
              : "두 비밀번호가 아직 일치하지 않아요.";
          });
        }
      })();
    </script>
  </body>
</html>
