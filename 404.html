<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>페이지를 찾을 수 없어요 — Lumina Stage</title>
    <link rel="stylesheet" href="/styles.css" />
    <meta name="description" content="요청하신 페이지를 찾을 수 없습니다. Lumina Stage 홈으로 돌아가세요." />
    <meta name="robots" content="noindex, nofollow" />
    <style>
      .not-found-wrap {
        min-height: 70vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 64px 24px;
      }
      .not-found-card {
        max-width: 480px;
        text-align: center;
      }
      .not-found-code {
        font-size: 14px;
        letter-spacing: 0.18em;
        color: rgba(240, 238, 248, 0.62);
        text-transform: uppercase;
        margin-bottom: 12px;
      }
      .not-found-title {
        font-size: 28px;
        line-height: 1.3;
        margin: 0 0 16px;
      }
      .not-found-description {
        font-size: 15px;
        line-height: 1.7;
        color: rgba(240, 238, 248, 0.78);
        margin: 0 0 28px;
      }
      .not-found-actions {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }
      .not-found-actions a {
        min-width: 140px;
      }
      @media (max-width: 480px) {
        .not-found-title { font-size: 22px; }
        .not-found-actions a { width: 100%; min-width: 0; }
      }
    </style>
  </head>
  <body data-cms-page-key="not-found">
    <header class="site-header">
      <div class="shell header-inner">
        <a class="brand" href="/">
          <img class="brand-logo" src="/assets/brand/lumina-stage-logo.png" alt="Lumina Stage" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
          <span class="brand-copy brand-copy-fallback" style="display:flex;flex-direction:column;">
            <strong>Lumina Stage</strong>
            <small>아티스트 레이블</small>
          </span>
        </a>
        <nav class="main-nav" aria-label="메인 메뉴">
          <a href="/">홈</a>
          <a href="/characters">아티스트</a>
          <a href="/lumina-pick">루미나 픽</a>
          <a href="/lumina-feed">루미나 피드</a>
          <a href="/story-stage" data-i18n="nav.story">스토리</a>
        </nav>
      </div>
    </header>
    <main>
      <section class="not-found-wrap">
        <div class="not-found-card">
          <p class="not-found-code">404 — Not Found</p>
          <h1 class="not-found-title" data-cms-key="not-found.hero.title">페이지를 찾을 수 없어요</h1>
          <p class="not-found-description" data-cms-key="not-found.hero.body">
            주소가 변경되었거나, 삭제된 페이지일 수 있어요.
            <br />
            홈으로 돌아가거나 아티스트 라인업을 다시 둘러보세요.
          </p>
          <div class="not-found-actions">
            <a class="button button-primary" href="/">홈으로 가기</a>
            <a class="button button-secondary" href="/characters">아티스트 보기</a>
          </div>
        </div>
      </section>
    </main>
    <script src="/cms-bootstrap.js"></script>
  </body>
</html>
