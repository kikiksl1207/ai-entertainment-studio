<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>이동 중… — Lumina Stage</title>
    <link rel="canonical" href="https://www.lumina-stage.com/verify-email" />
    <meta name="robots" content="noindex, nofollow" />
    <!-- #320 — 기존 .html 진입을 clean URL(/verify-email)로 최종 redirect. query/hash 보존. -->
    <script>
      (function () {
        var qs = window.location.search || "";
        var hash = window.location.hash || "";
        window.location.replace("/verify-email" + qs + hash);
      })();
    </script>
    <noscript>
      <meta http-equiv="refresh" content="0; url=/verify-email" />
    </noscript>
  </head>
  <body>
    <p style="font-family:system-ui,sans-serif;padding:24px;color:#333;">새 주소(/verify-email)로 이동 중입니다…
      <a href="/verify-email">바로 가기</a>
    </p>
  </body>
</html>
