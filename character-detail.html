<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>캐릭터 프로필 — Lumina Stage</title>
    <link rel="stylesheet" href="./styles.css" />
    <!-- SEO -->
    <meta name="description" content="Lumina Stage AI 엔터 아티스트의 공식 프로필, 숏폼 하이라이트, 팬 활동을 확인하세요." />
    <meta name="robots" content="index, follow" />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="캐릭터 프로필 — Lumina Stage" />
    <meta property="og:description" content="Lumina Stage AI 엔터 아티스트의 공식 프로필, 숏폼 하이라이트, 팬 활동을 확인하세요." />
    <meta property="og:image" content="./assets/characters/yoon-serin/thumb.png" />
    <meta property="og:url" content="https://www.lumina-stage.com/character-detail.html" />
    <meta property="og:site_name" content="Lumina Stage" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="캐릭터 프로필 — Lumina Stage" />
    <meta name="twitter:description" content="Lumina Stage AI 엔터 아티스트의 공식 프로필, 숏폼 하이라이트, 팬 활동을 확인하세요." />
    <meta name="twitter:image" content="./assets/characters/yoon-serin/thumb.png" />
  <style>
    /* CSS 충돌 방지 — 갤러리/프로필 레이아웃 직접 고정 */
    .detail-body-grid {
      display: grid !important;
      grid-template-columns: 1fr 1fr !important;
      gap: 24px !important;
      align-items: stretch !important;
      margin-bottom: 40px !important;
    }
    /* 갤러리 패널: flex column으로 슬라이더가 남은 공간을 채우도록 */
    .detail-gallery-panel {
      width: 100% !important;
      height: 100% !important;
      display: flex !important;
      flex-direction: column !important;
    }
    .detail-gallery-slider { width: 100% !important; overflow: hidden !important; border-radius: 16px !important; background: #16122a !important; }
    .gallery-track { display: flex !important; }
    /* 모바일: 갤러리/프로필 세로 쌓기 */
    @media (max-width: 768px) {
      .detail-body-grid {
        grid-template-columns: 1fr !important;
        gap: 16px !important;
      }
      .detail-gallery-panel {
        height: auto !important;
      }
    }
  </style>
</head>
  <body>
    <header class="site-header">
      <div class="shell header-inner">
        <a class="brand" href="./index.html">
          <img class="brand-logo" src="./assets/brand/lumina-stage-logo.png" alt="Lumina Stage" onerror="this.style.display='none'" />
          <span class="brand-copy">
            <strong>Lumina Stage</strong>
            <small>아티스트 레이블</small>
          </span>
        </a>

        <nav class="main-nav" aria-label="메인 메뉴">
          <a href="./index.html">홈</a>
          <a href="./characters.html">아티스트</a>
          <a href="./shortform.html">숏폼</a>
          <a href="./business.html">비즈니스</a>
        </nav>
        <div class="header-auth">
          <a class="auth-btn auth-btn-login" href="#">로그인</a>
          <a class="auth-btn auth-btn-signup" href="#">회원가입</a>
        </div>
      </div>
    </header>

    <main>
      <!-- 상단: 이미지(좌) + 이름/설명/태그(우) -->
      <section class="page-hero">
        <div class="shell detail-hero-layout">
          <div class="detail-hero-card" id="detailHero"></div>
          <div class="detail-intro-block">
            <div id="detailIntro"></div>
            <div id="detailMeta" class="detail-meta-panel"></div>
          </div>
        </div>
      </section>

      <!-- 하단: 갤러리 + 프로필 + 숏폼 -->
      <section class="content-section">
        <div class="shell">
          <div class="detail-body-grid">
            <!-- 갤러리 -->
            <div id="detailGallery" class="detail-gallery-panel"></div>

            <!-- 프로필 -->
            <div class="detail-profile-block">
              <p class="eyebrow">프로필</p>
              <h3>핵심 프로필</h3>
              <dl class="detail-profile-list" id="detailProfile"></dl>
            </div>
          </div>

          <!-- 대표 숏폼 -->
          <div class="detail-shorts-block">
            <p class="eyebrow">숏폼 하이라이트</p>
            <h3>대표 숏폼</h3>
            <div class="detail-short-grid" id="detailShorts"></div>
          </div>
        </div>
      </section>

      <!-- CTA -->
      <section class="content-section section-soft">
        <div class="shell" id="detailCta"></div>
      </section>

      <!-- 태그 -->
      <section class="content-section">
        <div class="shell">
          <p class="eyebrow">태그 탐색</p>
          <h3>이 캐릭터와 연결된 태그</h3>
          <div class="detail-tag-navigation" id="detailTagNavigation"></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="shell footer-inner">
        <div>
          <strong>Lumina Stage</strong>
          <p>Lumina Stage 공식 아티스트 프로필입니다.</p>
        </div>
        <p><a href="./characters.html">아티스트 목록</a></p>
      </div>
    </footer>

    <script src="./app.js"></script>
  </body>
</html>
