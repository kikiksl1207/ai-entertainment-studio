      <!-- #208 — 캐릭터챗 starter prompt 진입 (slug 자동 적용) -->
      <section class="content-section">
        <div class="shell" style="text-align:center;">
          <a id="chatStartLink" class="button button-primary" href="./character-chat.html" style="display:inline-flex;align-items:center;gap:8px;padding:14px 28px;font-size:15px;letter-spacing:0;">
            <span>이 아티스트와 대화하기</span>
            <span aria-hidden="true" style="font-size:13px;opacity:0.85;">→</span>
          </a>
          <p style="margin:10px 0 0;font-size:13px;color:rgba(220,210,240,0.55);font-weight:500;letter-spacing:0;">처음이라면 추천 인사말로 가볍게 첫 마디를 건네볼 수 있어요. 스타의 답장 기능은 곧 열려요.</p>
        </div>
        <script>
          (function () {
            try {
              const slug = new URLSearchParams(window.location.search).get("slug") || "";
              const link = document.getElementById("chatStartLink");
              if (slug && link) {
                link.href = "./character-chat.html?slug=" + encodeURIComponent(slug);
              }
            } catch (_) { /* noop */ }
          })();
        </script>
      </section>

      <!-- 하단: 갤러리 + 프로필 + 숏폼 -->
      <section class="content-section">
        <div class="shell">
          <div class="detail-body-grid">
            <!-- 갤러리 -->
            <div id="detailGallery" class="detail-gallery-panel"></div>

            <!-- 프로필 -->
            <div class="detail-profile-block">
              <p class="eyebrow">프로필</p>
              <h3>핵심 프로필</h3>
              <dl class="detail-profile-list" id="detailProfile"></dl>
            </div>
          </div>

          <!-- 대표 숏폼 -->
          <div class="detail-shorts-block">

            <h3>대표 숏폼</h3>
            <div class="detail-short-grid" id="detailShorts"></div>
          </div>
        </div>
      </section>

      <!-- CTA -->

      </section>

      <!-- 태그 -->
