<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>비밀번호 재설정 — Lumina Stage</title>
    <link rel="canonical" href="https://www.lumina-stage.com/reset-password" />
    <script>(function(){if(window.history&&history.replaceState&&location.pathname.length>1&&location.pathname.charAt(location.pathname.length-1)==="/"){history.replaceState(null,"",location.pathname.slice(0,-1)+location.search+location.hash);}})();</script>
    <link rel="stylesheet" href="/styles.css" />
    <meta name="description" content="Lumina Stage 비밀번호 재설정 페이지." />
    <meta name="robots" content="noindex, nofollow" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="비밀번호 재설정 — Lumina Stage" />
    <meta property="og:site_name" content="Lumina Stage" />
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-1L7TCBQ0N4"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-1L7TCBQ0N4');

  </head>
  <body class="is-booting">
    <header class="site-header">
      <div class="shell header-inner">
        <a class="brand" href="/">
          <img class="brand-logo" src="/assets/brand/lumina-stage-logo.png" alt="Lumina Stage" onerror="this.style.display='none'" />
          <span class="brand-copy">
            <strong>Lumina Stage</strong>
            <small data-i18n="brand.tagline">아티스트 레이블</small>
          </span>
        </a>
      </div>
    </header>

    <main>
      <section class="content-section auth-confirm-section">
        <div class="shell auth-confirm-shell">
          <article class="auth-confirm-card" id="resetPwCard" data-state="form" aria-live="polite">
            <p class="eyebrow" id="resetPwKicker">비밀번호 재설정</p>
            <h1 id="resetPwTitle" data-i18n="resetPassword.form.title">새 비밀번호를 설정해 주세요</h1>
            <p id="resetPwBody" data-i18n="resetPassword.form.body">기억하기 쉬우면서도 조금 복잡한 조합이 좋아요.</p>

            <form class="auth-confirm-form" id="resetPwForm" novalidate>
              <label class="auth-confirm-field">
                <span data-i18n="resetPassword.form.passwordLabel">새 비밀번호</span>
                <input id="resetPwNew" name="newPassword" type="password" autocomplete="new-password" minlength="8" required placeholder="8자 이상" />
                <small data-i18n="resetPassword.form.passwordHelper">영문·숫자·특수문자를 섞어 8자 이상을 추천드려요.</small>
              </label>
              <label class="auth-confirm-field">
                <span data-i18n="resetPassword.form.confirmLabel">새 비밀번호 다시 입력</span>
                <input id="resetPwConfirm" name="newPasswordConfirm" type="password" autocomplete="new-password" minlength="8" required placeholder="다시 한 번 입력" />
                <small id="resetPwConfirmHint">두 비밀번호가 같은지 확인해 주세요.</small>
              </label>
              <p class="auth-confirm-error" id="resetPwError" hidden></p>
              <button class="button button-primary" type="submit" id="resetPwSubmit" data-i18n="resetPassword.form.save">비밀번호 저장하기</button>
            </form>

            <nav class="auth-confirm-actions" id="resetPwActions" hidden>
              <a class="button button-primary" id="resetPwPrimaryAction" href="/mypage">로그인하러 가기</a>
              <a class="button button-secondary" id="resetPwSecondaryAction" href="/">홈으로</a>
            </nav>
          </article>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="shell footer-inner">
        <div>
          <strong>Lumina Stage</strong>
          <p>비밀번호 재설정 페이지입니다.</p>
        </div>
        <div class="footer-links">
          <a href="/characters" data-i18n="footer.artistRoster">아티스트 라인업</a>
          <a href="/terms" data-i18n="footer.terms">이용약관</a>
          <a href="/privacy" data-i18n="footer.privacy">개인정보처리방침</a>
          <a href="/refund-policy" data-i18n="footer.refund">환불 정책</a>
        </div>
      </div>
    </footer>

    <script src="/app.js"></script>
    <script>
      /* #240 — 비밀번호 재설정 화면.
       * URL `?token=...` 을 읽고, 사용자가 새 비밀번호만 입력하면
       * POST /api/v1/auth/password-resets/confirm { token, newPassword } 호출.
       * 성공/실패/만료/이미 사용된 토큰 상태를 카드 카피로 구분 표시.
       * 보안: token / newPassword 값을 콘솔·Notion·스토리지에 기록하지 않는다. */
      (function initResetPassword() {
        const card = document.getElementById("resetPwCard");
        const form = document.getElementById("resetPwForm");
        const newPwEl = document.getElementById("resetPwNew");
        const confirmEl = document.getElementById("resetPwConfirm");
        const submitBtn = document.getElementById("resetPwSubmit");
        const errorEl = document.getElementById("resetPwError");
        const kicker = document.getElementById("resetPwKicker");
        const title = document.getElementById("resetPwTitle");
        const body = document.getElementById("resetPwBody");
        const actions = document.getElementById("resetPwActions");
        const primary = document.getElementById("resetPwPrimaryAction");
        const secondary = document.getElementById("resetPwSecondaryAction");
        if (!card || !form) return;

        const params = new URLSearchParams(location.search);
        const token = params.get("token") || "";

        function t(key, fallback) {
          try {
            const fn = window?.luminaI18n?.t;
            if (typeof fn === "function") {
              const val = fn(key);
              if (val && val !== key) return val;
            }
          } catch (_) { /* noop */ }
          return fallback;
        }

        const STATE_KICKER = "비밀번호 재설정";

        function showError(message) {
          if (!errorEl) return;
          errorEl.hidden = !message;
          errorEl.textContent = message || "";
        }

        function setI18nKey(el, key) {
          if (!el) return;
          if (key) el.setAttribute("data-i18n", key);
          else el.removeAttribute("data-i18n");
        }

        function applyState(state, payload) {
          card.dataset.state = state;
          if (kicker) kicker.textContent = STATE_KICKER;
          if (state === "form") {
            form.hidden = false;
            if (actions) actions.hidden = true;
            setI18nKey(title, "resetPassword.form.title");
            setI18nKey(body, "resetPassword.form.body");
            title.textContent = t("resetPassword.form.title", "새 비밀번호를 설정해 주세요");
            body.textContent = t("resetPassword.form.body", "기억하기 쉬우면서도 조금 복잡한 조합이 좋아요.");
            return;
          }
          form.hidden = true;
          if (actions) actions.hidden = false;
          if (state === "success") {
            setI18nKey(title, "resetPassword.success.title");
            setI18nKey(body, "resetPassword.success.body");
            title.textContent = t("resetPassword.success.title", "새 비밀번호가 저장됐어요");
            body.textContent = payload?.message || t("resetPassword.success.body", "이제 새 비밀번호로 로그인해 주세요. 다른 기기에 로그인되어 있던 세션은 자동으로 정리됐어요.");
            if (primary) { primary.textContent = t("resetPassword.success.primary", "로그인하러 가기"); primary.href = "/mypage"; }
            if (secondary) { secondary.textContent = t("resetPassword.success.secondary", "홈으로"); secondary.href = "/"; }
          } else if (state === "expired") {
            setI18nKey(title, "resetPassword.expired.title");
            setI18nKey(body, "resetPassword.expired.body");
            title.textContent = t("resetPassword.expired.title", "이 재설정 링크는 시간이 지났어요");
            body.textContent = t("resetPassword.expired.body", "보안을 위해 재설정 링크는 1시간 동안만 열려 있어요. 다시 요청하면 새 메일이 발송돼요.");
            if (primary) { primary.textContent = t("resetPassword.expired.primary", "재설정 메일 다시 받기"); primary.href = "/#login"; }
            if (secondary) { secondary.textContent = t("resetPassword.success.secondary", "홈으로"); secondary.href = "/"; }
          } else if (state === "used") {
            setI18nKey(title, null);
            setI18nKey(body, null);
            if (title) title.textContent = "이미 사용한 재설정 링크예요";
            if (body) body.textContent = "이 링크는 이미 사용됐어요. 새 비밀번호로 로그인하거나, 다시 재설정 메일을 받아 주세요.";
            if (primary) { primary.textContent = t("resetPassword.success.primary", "로그인하러 가기"); primary.href = "/mypage"; }
            if (secondary) { secondary.textContent = t("resetPassword.invalid.primary", "재설정 메일 다시 받기"); secondary.href = "/#login"; }
          } else if (state === "invalid") {
            setI18nKey(title, "resetPassword.invalid.title");
            setI18nKey(body, "resetPassword.invalid.body");
            if (title) title.textContent = t("resetPassword.invalid.title", "재설정 링크가 맞지 않아요");
            if (body) body.textContent = t("resetPassword.invalid.body", "메일에서 받은 링크가 맞는지 다시 한 번 확인해 주세요. 가장 최근에 받은 재설정 메일의 링크만 동작해요.");
            if (primary) { primary.textContent = t("resetPassword.invalid.primary", "재설정 메일 다시 받기"); primary.href = "/#login"; }
            if (secondary) { secondary.textContent = t("resetPassword.invalid.secondary", "로그인 화면으로"); secondary.href = "/#login"; }
          } else if (state === "error") {
            setI18nKey(title, null);
            setI18nKey(body, null);
            if (title) title.textContent = "지금 처리하지 못했어요";
            if (body) body.textContent = "잠시 뒤에 다시 시도해 주세요. 같은 문제가 반복되면 재설정 메일을 새로 받아 주세요.";
            if (primary) { primary.textContent = t("resetPassword.invalid.primary", "재설정 메일 다시 받기"); primary.href = "/#login"; }
            if (secondary) { secondary.textContent = t("resetPassword.success.secondary", "홈으로"); secondary.href = "/"; }
          }
        }

        function classifyError(err) {
          const status = err?.status;
          const code = (err?.body?.error?.code || err?.body?.code || err?.body?.messageKey || err?.body?.error || "").toString().toLowerCase();
          if (status === 410 || (code.includes("expired") && !code.includes("invalid"))) return "expired";
          if (status === 409 || code.includes("already") || code.includes("used")) return "used";
          const tokenHint = code.includes("token") || code.includes("not_found");
          const inputHint = code.includes("password") || code.includes("email") || code.includes("validation") || code.includes("input");
          if (!tokenHint && (status === 422 || inputHint)) return "input";
          if (status === 400 || status === 404 || code.includes("invalid") || code.includes("not_found") || tokenHint) return "invalid";
          return "error";
        }

        if (!token) {
          // 토큰 없이 진입한 경우 폼 자체를 잠그고 invalid 안내
          applyState("invalid");
          return;
        }

        form.addEventListener("submit", async (event) => {
          event.preventDefault();
          showError("");
          const newPassword = newPwEl?.value || "";
          const confirm = confirmEl?.value || "";

          if (newPassword.length < 8) {
            showError(t("resetPassword.form.errorTooShort", "8자 이상으로 적어주세요."));
            newPwEl?.focus();
            return;
          }
          if (newPassword !== confirm) {
            showError(t("resetPassword.form.errorMismatch", "두 비밀번호가 달라요. 다시 확인해 주세요."));
            confirmEl?.focus();
            return;
          }
          if (typeof apiFetch !== "function") {
            applyState("error");
            return;
          }
          if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = t("resetPassword.form.saving", "저장하는 중"); }
          try {
            const data = await apiFetch("/api/v1/auth/password-resets/confirm", {
              method: "POST",
              body: { token, newPassword },
              throwOnError: true
            });
            applyState("success", data);
          } catch (err) {
            // 입력값(비밀번호 정책) 사유면 사용자 입력 다시 받기, 토큰 사유면 상태 전환
            const reason = classifyError(err);
            if (reason === "input") {
              showError("입력값을 확인해 주세요. 8자 이상 비밀번호가 필요해요.");
              if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = t("resetPassword.form.save", "비밀번호 저장하기"); }
              return;
            }
            applyState(reason);
          } finally {
            if (submitBtn && submitBtn.disabled && card.dataset.state === "form") {
              submitBtn.disabled = false;
              submitBtn.textContent = t("resetPassword.form.save", "비밀번호 저장하기");
            }
          }
        });

        // 확인 비밀번호 실시간 매치 힌트
        if (confirmEl) {
          confirmEl.addEventListener("input", () => {
            const hint = document.getElementById("resetPwConfirmHint");
            if (!hint) return;
            if (!confirmEl.value) {
              hint.textContent = "두 비밀번호가 같은지 확인해 주세요.";
              return;
            }
            hint.textContent = confirmEl.value === (newPwEl?.value || "")
              ? "두 비밀번호가 일치해요."
              : "두 비밀번호가 아직 일치하지 않아요.";
          });
        }
      })();
    </script>
  </body>
</html>
