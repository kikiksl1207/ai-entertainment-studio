<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>공개 프로필 — Lumina Stage</title>
    <link rel="canonical" href="https://www.lumina-stage.com/user-profile" />
    <meta name="description" content="Lumina Stage 공개 프로필." />
    <!--
      #319 clean URL shim — `/user-profile?handle=...` 진입을 실제 페이지인 `/user-profile.html`로 안전하게 전달합니다.
    -->
    <script>
      (function () {
        var qs = window.location.search || "";
        var hash = window.location.hash || "";
        window.location.replace("../user-profile.html" + qs + hash);
      })();
    </script>
    <noscript>
      <meta http-equiv="refresh" content="0; url=../user-profile.html" />
    </noscript>
  </head>
  <body>
    <p style="font-family:system-ui,sans-serif;padding:24px;color:#333;">공개 프로필 페이지로 이동 중입니다…
      <a href="../user-profile.html">바로 가기</a>
    </p>
  </body>
</html>
