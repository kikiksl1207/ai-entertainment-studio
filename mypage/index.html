<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>마이페이지 — Lumina Stage</title>
    <link rel="canonical" href="https://www.lumina-stage.com/mypage" />
    <meta name="robots" content="noindex, nofollow" />
    <!--
      #319 clean URL shim — `/mypage` 진입을 실제 페이지인 `/mypage.html`로 안전하게 전달합니다.
      hash(`#debut`, `#settings`)와 query string은 유지됩니다.
    -->
    <script>
      (function () {
        var qs = window.location.search || "";
        var hash = window.location.hash || "";
        window.location.replace("../mypage.html" + qs + hash);
      })();
    </script>
    <noscript>
      <meta http-equiv="refresh" content="0; url=../mypage.html" />
    </noscript>
  </head>
  <body>
    <p style="font-family:system-ui,sans-serif;padding:24px;color:#333;">마이페이지로 이동 중입니다…
      <a href="../mypage.html">바로 가기</a>
    </p>
  </body>
</html>
