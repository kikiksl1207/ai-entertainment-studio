<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>이동 중 — Lumina Stage</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="canonical" href="/characters/" />
    <!-- #319 — clean URL shim. JS 켜진 환경에서는 location.replace 로 query/hash 보존하며 이동.
         JS 꺼진 환경에서는 meta refresh 로 fallback (query 일부 손실 가능, 동작 보장 우선). -->
    <noscript><meta http-equiv="refresh" content="0;url=/characters.html" /></noscript>
    <script>
      (function () {
        var target = "/characters.html" + (location.search || "") + (location.hash || "");
        location.replace(target);
      }());
    </script>
  </head>
  <body>
    <p style="font-family:system-ui,-apple-system,'Segoe UI',sans-serif;color:#888;padding:24px;line-height:1.6;">
      잠시만요. 자동으로 이동되지 않으면 <a href="/characters.html">여기를 눌러 페이지로 이동</a>해주세요.
    </p>
  </body>
</html>
